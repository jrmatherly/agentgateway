global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "agentgateway-rules.yml"

scrape_configs:
  - job_name: "agentgateway"
    static_configs:
      - targets: ["agentgateway:8080"]
    scrape_interval: 10s
    metrics_path: /metrics

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
    scrape_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
