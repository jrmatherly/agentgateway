apiVersion: v1
kind: Namespace
metadata:
  name: agentgateway
  labels:
    name: agentgateway
    app.kubernetes.io/name: agentgateway
    app.kubernetes.io/part-of: agentgateway-platform
---
# Network policies for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentgateway-network-policy
  namespace: agentgateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agentgateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
  egress:
    - to: [] # Allow all egress (can be restricted based on requirements)
