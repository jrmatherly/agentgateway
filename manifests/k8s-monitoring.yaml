apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: agentgateway
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: agentgateway-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
      app.kubernetes.io/component: collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/component: collector
        app.kubernetes.io/part-of: agentgateway-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: otel-collector
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.94.0
          args:
            - "--config=/etc/otelcol-contrib/config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
          env:
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
      terminationGracePeriodSeconds: 30
      restartPolicy: Always

---
# ServiceMonitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agentgateway
  namespace: agentgateway
  labels:
    app.kubernetes.io/name: agentgateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: agentgateway-platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: agentgateway
      app.kubernetes.io/component: gateway
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scheme: http

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  namespace: agentgateway
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
      app.kubernetes.io/component: collector
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
      scheme: http

---
# PrometheusRule for alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: agentgateway
  namespace: agentgateway
  labels:
    app.kubernetes.io/name: agentgateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: agentgateway-platform
spec:
  groups:
    - name: agentgateway.rules
      rules:
        - alert: AgentgatewayDown
          expr: up{job="agentgateway"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Agentgateway instance is down"
            description: "Agentgateway instance {{ $labels.instance }} has been down for more than 1 minute."

        - alert: AgentgatewayHighErrorRate
          expr: rate(http_requests_total{job="agentgateway",status=~"5.."}[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate in Agentgateway"
            description: "Error rate is {{ $value }} errors per second on {{ $labels.instance }}."

        - alert: AgentgatewayHighLatency
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="agentgateway"}[5m])) > 1.0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High latency in Agentgateway"
            description: "95th percentile latency is {{ $value }}s on {{ $labels.instance }}."

        - alert: AgentgatewayHighCPU
          expr: rate(container_cpu_usage_seconds_total{pod=~"agentgateway-.*"}[5m]) * 100 > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage in Agentgateway"
            description: "CPU usage is {{ $value }}% on {{ $labels.pod }}."

        - alert: AgentgatewayHighMemory
          expr: container_memory_usage_bytes{pod=~"agentgateway-.*"} / container_spec_memory_limit_bytes * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage in Agentgateway"
            description: "Memory usage is {{ $value }}% on {{ $labels.pod }}."
