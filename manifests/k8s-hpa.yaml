apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agentgateway
  namespace: agentgateway
  labels:
    app.kubernetes.io/name: agentgateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: agentgateway-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentgateway
  minReplicas: 3
  maxReplicas: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Custom metrics (requires metrics server and custom metrics API)
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agentgateway
  namespace: agentgateway
  labels:
    app.kubernetes.io/name: agentgateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: agentgateway-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agentgateway
      app.kubernetes.io/component: gateway
