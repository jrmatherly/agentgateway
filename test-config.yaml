# yaml-language-server: $schema=schema/local.json
config:
  adminAddr: "0.0.0.0:15000"
  statsAddr: "0.0.0.0:8080"
  readinessAddr: "0.0.0.0:8081"
binds:
  - port: 3000
    listeners:
      - routes:
          - policies:
              cors:
                allowOrigins:
                  - "*"
                allowHeaders:
                  - mcp-protocol-version
                  - content-type
                  - cache-control
            backends:
              - mcp:
                  targets:
                    - name: everything
                      stdio:
                        cmd: npx
                        args: ["@modelcontextprotocol/server-everything"]
