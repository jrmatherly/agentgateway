version: "3.8"

services:
  #==================================================#
  #               Agentgateway                       #
  #==================================================#
  agentgateway:
    build:
      target: runner # Use runner stage for proper binary location
      args:
        - PROFILE=dev
        - BUILDKIT_INLINE_CACHE=1
    environment:
      - BUILDX_NO_DEFAULT_ATTESTATIONS=1  # Disable provenance attestations for faster builds
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
    volumes:
      - ./examples:/app/examples:ro
    healthcheck:
      test: ["CMD", "/app/agentgateway", "--validate-only", "-f", "/app/examples/basic/config.yaml"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "3000:3000"
      - "8080:8080"
      - "9000:9000" # Debug port
    command:
      [
        "-f",
        "/app/examples/basic/config.yaml",
      ]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  #==================================================#
  #               MCP Mock Server                    #
  #==================================================#
  mcp-mock:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    command: ["npx", "@modelcontextprotocol/server-everything"]
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "pgrep", "-f", "@modelcontextprotocol/server-everything"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - dev
      - testing

  #==================================================#
  #               Development Tools                  #
  #==================================================#
  dev-tools:
    image: rust:1.89.0-slim-bookworm
    working_dir: /app
    volumes:
      - .:/app
      - target_cache:/app/target
      - cargo_registry:/usr/local/cargo/registry
    command: ["tail", "-f", "/dev/null"]
    profiles:
      - dev

volumes:
  target_cache:
  cargo_registry:
